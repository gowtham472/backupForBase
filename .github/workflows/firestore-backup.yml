name: Firestore Backup

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run Firestore backup
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          FIRESTORE_COLLECTIONS: ${{ vars.FIRESTORE_COLLECTIONS }}
          BACKUP_RETENTION_DAYS: ${{ vars.BACKUP_RETENTION_DAYS || '30' }}
        run: npm run backup:firestore

      - name: Commit backup files
        run: |
          git config --global user.name "backup-bot"
          git config --global user.email "backup@bot.com"

          git add backups/firestore

          if git diff --staged --quiet; then
            echo "No backup changes detected"
            exit 0
          fi

          git commit -m "Firestore backup $(date -u +%F)"
          git push
